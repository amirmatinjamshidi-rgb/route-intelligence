name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        package-manager: [npm, pnpm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install (npm)
        if: matrix.package-manager == 'npm'
        run: npm ci

      - name: Install (pnpm)
        if: matrix.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node cache (pnpm)
        if: matrix.package-manager == 'pnpm'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: pnpm install
        if: matrix.package-manager == 'pnpm'
        run: pnpm install --frozen-lockfile

      - run: npm run lint
        if: matrix.package-manager == 'npm'

      - run: pnpm lint
        if: matrix.package-manager == 'pnpm'

      - run: npm run typecheck
        if: matrix.package-manager == 'npm'

      - run: pnpm typecheck
        if: matrix.package-manager == 'pnpm'

      - run: npm run build
        if: matrix.package-manager == 'npm'

      - run: pnpm build
        if: matrix.package-manager == 'pnpm'

      - run: npm test
        if: matrix.package-manager == 'npm'

      - run: pnpm test
        if: matrix.package-manager == 'pnpm'

  analyze-smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: node packages/cli/dist/cli.js analyze --root . --format json --out ri-output
      - run: test -f ri-output/graph.json
